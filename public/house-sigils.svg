<!--
  House and Institution Sigils
  Style: Monochrome seal/stamp aesthetic — heraldic marks as a die would press them.
  Stroke weights: 1.6 main forms, 1.1 detail (consistent across all icons)
  Use: <svg><use href="/house-sigils.svg#icon-house-valdris" /></svg>
-->
<svg xmlns="http://www.w3.org/2000/svg">

  <!-- House Valdris: Ward key (access, property, locked ledgers) -->
  <symbol id="icon-house-valdris" viewBox="0 0 24 24">
    <circle cx="6.8" cy="7" r="4.4" fill="none" stroke="currentColor" stroke-width="1.6"/>
    <circle cx="6.8" cy="7" r="2" fill="none" stroke="currentColor" stroke-width="1.1"/>
    <path fill="none" stroke="currentColor" stroke-width="1.1" stroke-linecap="round" d="M6.8 2.6 v1.6 M6.8 9.8 v1.6 M2.4 7 h1.6 M9.6 7 h1.6"/>
    <path fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" d="M11.2 7 H18 M18 7 V14.6"/>
    <path fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" d="M18 10.2 h2.8 v2 h-2.8 M18 14.6 h2"/>
    <path fill="none" stroke="currentColor" stroke-width="1.1" stroke-linecap="round" d="M13.4 5.8 v2.4"/>
  </symbol>

  <!-- House Sorn: Fouled anchor (old lines, legitimacy gate) -->
  <symbol id="icon-house-sorn" viewBox="0 0 24 24">
    <circle cx="12" cy="9.6" r="4.6" fill="none" stroke="currentColor" stroke-width="1.6"/>
    <circle cx="12" cy="9.6" r="2.2" fill="none" stroke="currentColor" stroke-width="1.1"/>
    <path fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" d="M12 14.2 V21 M8.6 5 V3.2 a3.4 3.4 0 0 1 6.8 0 V5"/>
    <path fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" d="M9 15.6 h6"/>
    <path fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" d="M7.4 18 Q12 22.6 16.6 18"/>
    <path fill="none" stroke="currentColor" stroke-width="1.1" stroke-linecap="round" d="M16.8 6.4 q2.4 1.6 1.8 4.2"/>
  </symbol>

  <!-- House Merrow: Bound chain (dock leverage, binding ties) -->
  <symbol id="icon-house-merrow" viewBox="0 0 24 24">
    <ellipse cx="8" cy="9.4" rx="3.6" ry="5.2" fill="none" stroke="currentColor" stroke-width="1.6"/>
    <ellipse cx="16" cy="14.6" rx="3.6" ry="5.2" fill="none" stroke="currentColor" stroke-width="1.6"/>
    <ellipse cx="8" cy="9.4" rx="1.6" ry="3" fill="none" stroke="currentColor" stroke-width="1.1"/>
    <ellipse cx="16" cy="14.6" rx="1.6" ry="3" fill="none" stroke="currentColor" stroke-width="1.1"/>
    <path fill="none" stroke="currentColor" stroke-width="1.1" stroke-linecap="round" d="M8 2.4 v1.4 M16 20.2 v1.4"/>
  </symbol>

  <!-- Lantern Vale Inn: Lit oil lamp (information, anonymity) -->
  <symbol id="icon-venue-lantern-vale" viewBox="0 0 24 24">
    <path fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" d="M6 10 H18 M8 10 V16 M16 10 V16 M6 10 L7 5 H17 L18 10 M9 16 v2 a3 3 0 0 0 6 0 v-2"/>
    <path fill="none" stroke="currentColor" stroke-width="1.1" stroke-linecap="round" d="M10 10 v6 M14 10 v6"/>
    <path fill="none" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round" d="M12 11.2 q-1.3 1.7 0 3.2 q1.3 -1.5 0 -3.2 Z"/>
    <path fill="none" stroke="currentColor" stroke-width="1.1" stroke-linecap="round" d="M10.6 5 V3.4 h2.8 V5"/>
  </symbol>

  <!-- Chapel of Saint Vey: Open registry under the mark (registry, confession) -->
  <symbol id="icon-venue-chapel-st-vey" viewBox="0 0 24 24">
    <path fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" d="M4 7c2-1 4-1 6 0v12c-2-1-4-1-6 0V7zM20 7c-2-1-4-1-6 0v12c2-1 4-1 6 0V7zM10 7v12M14 7v12"/>
    <path fill="none" stroke="currentColor" stroke-width="1.1" stroke-linecap="round" d="M5.6 9.4 q1.6 -.5 2.8 0 M5.6 12 q1.6 -.5 2.8 0 M5.6 14.6 q1.6 -.5 2.8 0 M15.6 9.4 q1.6 -.5 2.8 0 M15.6 12 q1.6 -.5 2.8 0"/>
    <path fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" d="M12 1.8 v3 M10.8 3.1 h2.4"/>
  </symbol>

  <!-- Salt Ledger Hall: Weighed measures (contracts, debt, balance) -->
  <symbol id="icon-institution-salt-ledger" viewBox="0 0 24 24">
    <path fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" d="M12 3.6 V15"/>
    <circle cx="12" cy="2.6" r="1" fill="none" stroke="currentColor" stroke-width="1.1"/>
    <path fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" d="M6 6 H18"/>
    <path fill="none" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round" d="M6 6 L3 12 H9 L6 6 Z M18 6 L15 12 H21 L18 6 Z"/>
    <path fill="none" stroke="currentColor" stroke-width="1.1" stroke-linecap="round" d="M4 14.4 q2 1.2 4 0 M16 14.4 q2 1.2 4 0"/>
    <path fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" d="M9 17.4 H15 M5 19.8 H19"/>
  </symbol>

  <!-- House Sable-Cairn: Broken seal (fallen prestige, fractured house) -->
  <symbol id="icon-house-sable-cairn" viewBox="0 0 24 24">
    <path fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" d="M12 4 a7 7 0 0 1 7 7 c0 1.5 -.5 3 -1.5 4 M12 4 a7 7 0 0 0 -7 7 c0 1.5 .5 3 1.5 4"/>
    <path fill="none" stroke="currentColor" stroke-width="1.1" stroke-linecap="round" d="M12 6.2 a4.8 4.8 0 0 1 4.8 4.8 M7.2 11 a4.8 4.8 0 0 1 4.8 -4.8"/>
    <path fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" d="M8 12 h3 M13 12 h3"/>
    <path fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" d="M12 9.6 l-1.2 2.4 1.6 1.4 -1 2"/>
    <path fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" d="M6 18.6 l2 -3 M18 18.6 l-2 -3"/>
  </symbol>

</svg>
